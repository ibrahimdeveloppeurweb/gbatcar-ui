<div class="container">
  <div class="row w-100 mx-0 auth-page">
    <div class="col-md-8 col-xl-6 mx-auto">
      <div class="card">
        <div class="row">
          <div class="col-md-4 pe-md-0">
            <div class="auth-side-wrapper" [ngStyle]="{ 'background-image': 'url(images/login-image.png)' }">
            </div>
          </div>
          <div class="col-md-8 ps-md-0">
            <div class="auth-form-wrapper px-4 py-5">
              <a routerLink="." class="nobleui-logo d-block mb-2">Gbat<span>Car</span></a>
              <h5 class="text-secondary fw-normal mb-4">Bon retour ! Connectez-vous à votre compte.</h5>

              <form class="forms-sample" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Adresse e-mail</label>
                  <input type="email" id="loginEmail" formControlName="username" class="form-control"
                    [class.is-invalid]="f['username'].touched && f['username'].errors" placeholder="E-mail"
                    autocomplete="email" />
                  <div *ngIf="f['username'].touched && f['username'].errors" class="invalid-feedback">
                    <span *ngIf="f['username'].errors?.['required']">L'e-mail est requis.</span>
                    <span *ngIf="f['username'].errors?.['email']">Format d'e-mail invalide.</span>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Mot de passe</label>
                  <div class="input-group">
                    <input [type]="showPwd ? 'text' : 'password'" id="loginPassword" formControlName="password"
                      class="form-control" [class.is-invalid]="f['password'].touched && f['password'].errors"
                      placeholder="Mot de passe" autocomplete="current-password" />
                    <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()"
                      style="padding: 0.375rem 0.65rem;">
                      <ng-container *ngIf="!showPwd">
                        <!-- Eye icon (show password) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                          viewBox="0 0 24 24">
                          <path
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                        </svg>
                      </ng-container>
                      <ng-container *ngIf="showPwd">
                        <!-- Eye-off icon (hide password) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                          viewBox="0 0 24 24">
                          <path
                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-5 0-9.27-3.11-11-7.5a10.05 10.05 0 0 1 2.91-4.12M6.53 6.53A10.07 10.07 0 0 1 12 4c5 0 9.27 3.11 11 7.5a10.05 10.05 0 0 1-1.44 2.7M1 1l22 22M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                        </svg>
                      </ng-container>
                    </button>
                    <div *ngIf="f['password'].touched && f['password'].errors" class="invalid-feedback">
                      <span *ngIf="f['password'].errors?.['required']">Le mot de passe est requis.</span>
                      <span *ngIf="f['password'].errors?.['minlength']">Minimum 6 caractères.</span>
                    </div>
                  </div>
                </div>

                <div class="form-check mb-3">
                  <input type="checkbox" class="form-check-input" id="authCheck">
                  <label class="form-check-label" for="authCheck">Se souvenir de moi</label>
                </div>

                <div>
                  <button type="submit" class="btn btn-primary me-2 mb-2 mb-md-0" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" role="status"
                      aria-hidden="true"></span>
                    {{ loading ? 'Connexion...' : 'Se connecter' }}
                  </button>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
