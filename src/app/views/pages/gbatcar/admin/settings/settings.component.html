<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin">
    <div>
        <h4 class="mb-3 mb-md-0">Paramètres Généraux</h4>
    </div>
</div>

<form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
    <div class="row">
        <!-- Section: Frais & Tarifs -->
        <div class="col-md-6 grid-margin stretch-card">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title fw-bolder mb-4">FRAIS ET PÉNALITÉS</h6>

                    <div class="mb-4">
                        <label class="form-label">Normes Frais de Dossier (FCFA)</label>
                        <input type="number" class="form-control" formControlName="fraisDossier"
                            [ngClass]="{'is-invalid': settingsForm.get('fraisDossier')?.invalid && settingsForm.get('fraisDossier')?.touched}">
                        <div *ngIf="settingsForm.get('fraisDossier')?.invalid && settingsForm.get('fraisDossier')?.touched"
                            class="invalid-feedback">
                            Valeur invalide.
                        </div>
                        <small class="form-text text-muted mt-2 d-block">Ce montant sera proposé par défaut lors de la
                            création d'un nouveau contrat.</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Pénalité de retard journalière (%)</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control"
                                formControlName="penaliteRetardJournaliere"
                                [ngClass]="{'is-invalid': settingsForm.get('penaliteRetardJournaliere')?.invalid && settingsForm.get('penaliteRetardJournaliere')?.touched}">
                            <span class="input-group-text bg-light">%</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Délai de grâce avant pénalités (Jours)</label>
                        <input type="number" class="form-control" formControlName="delaiGracePenalite"
                            [ngClass]="{'is-invalid': settingsForm.get('delaiGracePenalite')?.invalid && settingsForm.get('delaiGracePenalite')?.touched}">
                    </div>
                </div>
            </div>
        </div>

        <!-- Section: Contrats par défaut -->
        <div class="col-md-6 grid-margin stretch-card">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title fw-bolder mb-4">MODÈLE ÉCONOMIQUE</h6>

                    <div class="mb-4">
                        <label class="form-label">Durée de Contrat par défaut (Mois)</label>
                        <input type="number" class="form-control" formControlName="dureeContratDefautMois"
                            [ngClass]="{'is-invalid': settingsForm.get('dureeContratDefautMois')?.invalid && settingsForm.get('dureeContratDefautMois')?.touched}">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Apport Initial / Dépôt de Garantie (%)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" formControlName="apportInitialPourcentage"
                                [ngClass]="{'is-invalid': settingsForm.get('apportInitialPourcentage')?.invalid && settingsForm.get('apportInitialPourcentage')?.touched}">
                            <span class="input-group-text bg-light">%</span>
                        </div>
                        <small class="form-text text-muted mt-2 d-block">Pourcentage de la valeur totale du véhicule
                            requis à la signature.</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="col-12 mb-5 mt-3">
            <button type="submit" class="btn btn-primary d-inline-flex align-items-center">
                <i data-feather="save" appFeatherIcon class="icon-sm me-2"></i>
                Enregistrer les modifications
            </button>
        </div>
    </div>
</form>
