<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin">
    <div>
        <nav class="page-breadcrumb mb-1">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a routerLink="/gbatcar/payments/penalties">Gestion des Pénalités</a></li>
                <li class="breadcrumb-item active" aria-current="page">Émettre une Amende</li>
            </ol>
        </nav>
        <h4 class="mb-3 mb-md-0 text-danger">Émettre une Amende / Pénalité</h4>
    </div>
    <div class="d-flex align-items-center flex-wrap text-nowrap">
        <button [routerLink]="['/gbatcar/payments/penalties']"
            class="btn btn-outline-secondary btn-icon-text me-2 mb-2 mb-md-0">
            <i data-feather="x" appFeatherIcon class="btn-icon-prepend"></i>
            Annuler
        </button>
        <button class="btn btn-danger btn-icon-text mb-2 mb-md-0">
            <i data-feather="save" appFeatherIcon class="btn-icon-prepend"></i>
            Valider la Pénalité
        </button>
    </div>
</div>

<div class="row">
    <div class="col-md-12 stretch-card">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title text-danger">Détails de l'infraction ou du manquement</h6>
                <form [formGroup]="penaltyForm">
                    <div class="row">
                        <div class="col-sm-6 mb-3">
                            <label class="form-label text-dark fw-medium">Contrat cible <span
                                    class="text-danger">*</span></label>
                            <select class="form-select border-danger-subtle" formControlName="contractId"
                                [ngClass]="{'is-invalid': penaltyForm.get('contractId')?.invalid && penaltyForm.get('contractId')?.touched}">
                                <option value="">Sélectionnez le contrat lié (Locataire)...</option>
                                <option value="CTR-2024-001">CTR-2024-001 - Jean Dubois (Toyota Yaris)</option>
                                <option value="CTR-2024-002">CTR-2024-002 - Fatou Sylla (Suzuki Swift)</option>
                            </select>
                            <small class="text-muted">La pénalité sera ajoutée à la dette "Abonnement Location-Vente" du
                                locataire.</small>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <label class="form-label text-dark fw-medium">Motif & Justification <span
                                    class="text-danger">*</span></label>
                            <input class="form-control" formControlName="reason"
                                placeholder="Ex: Retard paiement mensuel, Excès de vitesse..."
                                [ngClass]="{'is-invalid': penaltyForm.get('reason')?.invalid && penaltyForm.get('reason')?.touched}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-sm-4 mb-3">
                            <label class="form-label text-dark fw-medium">Gravité de l'acte</label>
                            <select class="form-select" formControlName="severity">
                                <option value="Faible">Faible (Avertissement financier)</option>
                                <option value="Moyenne">Moyenne (Infraction routière simple)</option>
                                <option value="Élevée">Élevée (Mise en danger, Dégradation)</option>
                            </select>
                        </div>
                        <div class="col-sm-4 mb-3">
                            <label class="form-label text-dark fw-medium">Montant Exigé (FCFA) <span
                                    class="text-danger">*</span></label>
                            <input type="number" class="form-control font-weight-bold text-danger"
                                formControlName="amount"
                                [ngClass]="{'is-invalid': penaltyForm.get('amount')?.invalid && penaltyForm.get('amount')?.touched}"
                                placeholder="Ex: 5000">
                        </div>
                        <div class="col-sm-4 mb-3">
                            <label class="form-label text-dark fw-medium">Échéance de régularisation <span
                                    class="text-danger">*</span></label>
                            <input type="date" class="form-control" formControlName="dueDate"
                                [ngClass]="{'is-invalid': penaltyForm.get('dueDate')?.invalid && penaltyForm.get('dueDate')?.touched}">
                            <small class="text-muted">Date limite de paiement du recouvrement.</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-sm-12 mb-3">
                            <label class="form-label text-dark fw-medium">Rapport circonstancié / Commentaire</label>
                            <textarea class="form-control" formControlName="notes" rows="3"
                                placeholder="Informations complémentaires, lien du constat de police..."></textarea>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
