<div class="row">
  <div class="col-md-12">
    <div class="row">
      <div class="col-12 grid-margin">
        <div class="card">
          <div class="card-body">
            <full-calendar [options]='calendarOptions'></full-calendar>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Creation Evenement -->
<ng-template #eventModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Nouvel Événement</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body">
    <form>
      <div class="mb-3">
        <label class="form-label font-weight-bold">Date sélectionnée</label>
        <div class="form-control bg-light text-muted" style="cursor: not-allowed;">
          {{ eventStartDate | date:'EEEE dd MMMM yyyy' }}
        </div>
      </div>
      <div class="mb-3">
        <label for="eventTitle" class="form-label font-weight-bold">Titre / Motif de l'événement</label>
        <textarea id="eventTitle" class="form-control" name="eventTitle" [(ngModel)]="eventTitle"
          placeholder="Ex: Réunion d'équipe..." rows="3" required></textarea>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close('cancel')">Annuler</button>
    <button type="button" class="btn btn-primary" (click)="modal.close('save')"
      [disabled]="!eventTitle">Enregistrer</button>
  </div>
</ng-template>

<!-- Modal Détail Evenement -->
<ng-template #eventDetailModal let-modal>
  <div class="modal-header" [style.border-left]="'5px solid ' + (selectedEvent?.borderColor || '#00cccc')">
    <h5 class="modal-title">
      <i class="mdi mdi-calendar-check mr-2"></i> Détail de l'événement
    </h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <div class="mb-3">
      <label class="form-label text-muted small">DATE</label>
      <div class="fw-bold">{{ selectedEvent?.start | date:'EEEE dd MMMM yyyy' }}</div>
    </div>
    <div class="mb-3">
      <label class="form-label text-muted small">MOTIF / TITRE</label>
      <ng-container *ngIf="!isEditingEvent; else editForm">
        <div class="p-2 border rounded bg-light">{{ selectedEvent?.title }}</div>
      </ng-container>
      <ng-template #editForm>
        <textarea class="form-control" name="editTitle" [(ngModel)]="editEventTitle" rows="3"></textarea>
      </ng-template>
    </div>
  </div>
  <div class="modal-footer d-flex justify-content-between">
    <button type="button" class="btn btn-danger" (click)="confirmDeleteEvent(modal)">
      <i class="mdi mdi-delete"></i> Supprimer
    </button>
    <div>
      <button type="button" class="btn btn-secondary me-2" (click)="modal.dismiss()">Fermer</button>
      <ng-container *ngIf="!isEditingEvent; else saveBtn">
        <button type="button" class="btn btn-warning" (click)="startEditEvent()">
          <i class="mdi mdi-pencil"></i> Modifier
        </button>
      </ng-container>
      <ng-template #saveBtn>
        <button type="button" class="btn btn-primary" (click)="saveEditedEvent(modal)">
          <i class="mdi mdi-check"></i> Enregistrer
        </button>
      </ng-template>
    </div>
  </div>
</ng-template>
